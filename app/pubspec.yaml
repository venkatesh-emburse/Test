name: liveconnect
description: LiveConnect - Dating app with safety-first approach

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^12.0.0

  # HTTP & Networking
  dio: ^5.3.0
  socket_io_client: ^2.0.0

  # Local Storage
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0

  # UI Components
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  google_fonts: ^6.1.0

  # Maps
  flutter_map: ^6.0.0
  latlong2: ^0.9.0

  # Location
  geolocator: ^10.0.0

  # Image Handling
  image_picker: ^1.0.0
  # image_cropper: ^5.0.0  # Temporarily disabled due to Android v1 embedding

  # Animations
  lottie: ^2.7.0
  flutter_animate: ^4.3.0

  # Cards for Swipe
  flutter_card_swiper: ^6.0.0

  # In-App Purchases
  # purchases_flutter: ^6.0.0  # Temporarily disabled due to Android v1 embedding

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.0
  permission_handler: ^11.0.0

  # Form Validation
  reactive_forms: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # fonts:
